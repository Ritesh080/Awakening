[build]
  # Delete the lockfile before installing: it was generated on macOS, and
  # Vite's Rolldown bundler ships OS-specific native binaries. Installing
  # from a lockfile pinned to a different platform can skip fetching the
  # correct Linux binary (seen on Render's build servers too), so we force
  # npm to resolve fresh against this Linux build machine instead.
  command = "rm -f package-lock.json && npm install && npm run build"
  publish = "dist"

# React Router client-side routes (e.g. /app/journey, /pricing) need to
# resolve to index.html so a direct load or refresh doesn't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
